workflows:
  android-workflow:
    name: Build Android (signed if keystore provided, otherwise unsigned)
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        working_directory: GPA
        script: |
          flutter pub get

      - name: Prepare keystore if provided (optional)
        working_directory: GPA
        script: |
          set -e
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 present — producing signed APK"
            echo "$KEYSTORE_BASE64" | base64 --decode > ./android/keystore.jks
            # Use printf to write a properties file safely (avoids heredoc parsing issues in UI)
            printf "storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > ./android/key.properties
            SIGNED_BUILD=true
          else
            echo "No KEYSTORE_BASE64 provided — building unsigned APK for testing"
            SIGNED_BUILD=false
          fi

      - name: Build APK
        working_directory: GPA
        script: |
          set -e
          if [ "$SIGNED_BUILD" = true ]; then
            echo "Building signed release APK..."
            flutter build apk --release
          else
            echo "Building unsigned release APK..."
            flutter build apk --release
            # The unsigned APK will be available at build/app/outputs/apk/release/
          fi

    artifacts:
      - GPA/build/app/outputs/apk/release/*.apk

    # Notes:
    # - This workflow avoids heredoc blocks when generating key.properties to prevent any YAML
    #   parsing issues if the workflow is viewed/edited in the Codemagic UI.
    # - If you provide the following env vars (secure) in Codemagic, the build will be signed:
    #     KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
    # - If not provided, Codemagic will still produce an unsigned release APK for testing.
