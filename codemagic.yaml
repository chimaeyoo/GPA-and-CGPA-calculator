workflows:
  android-workflow:
    name: Build Android (signed if keystore provided, otherwise unsigned)
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        working_directory: GPA
        script: |
          flutter pub get

      - name: Prepare keystore if provided (optional)
        working_directory: GPA
        script: |
          set -e
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 present — producing signed APK"
            echo "$KEYSTORE_BASE64" | base64 --decode > ./android/keystore.jks
            cat > ./android/key.properties <<EOL
storeFile=keystore.jks
storePassword=$KEYSTORE_PASSWORD
keyAlias=$KEY_ALIAS
keyPassword=$KEY_PASSWORD
EOL
            SIGNED_BUILD=true
          else
            echo "No KEYSTORE_BASE64 provided — building unsigned APK for testing"
            SIGNED_BUILD=false
          fi

      - name: Build APK
        working_directory: GPA
        script: |
          set -e
          if [ "$SIGNED_BUILD" = true ]; then
            echo "Building signed release APK..."
            flutter build apk --release
          else
            echo "Building unsigned release APK..."
            # Build release APK (if no signing config present, this will produce an unsigned APK)
            flutter build apk --release
            # Note: if you need an explicitly unsigned artifact, the Android Gradle plugin
            # produces an unsigned APK at build/app/outputs/apk/release/app-release-unsigned.apk
          fi

    artifacts:
      - GPA/build/app/outputs/apk/release/*.apk

    # Notes:
    # - If you provide KEYSTORE_BASE64 and related variables, the build will be signed.
    # - If you don't provide them, the workflow will still produce an unsigned release APK for testing.
